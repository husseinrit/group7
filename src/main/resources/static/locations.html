<!DOCTYPE html>
<!-- Hussein Al Salami - 746006849 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Off Locations - Reloop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f7f0; }
        .navbar { background-color: #2e7d32; }
        .page-header { background-color: #2e7d32; color: white; padding: 20px 0; margin-bottom: 30px; }
        .btn-primary { background-color: #2e7d32; border-color: #2e7d32; }
        .btn-primary:hover { background-color: #1b5e20; border-color: #1b5e20; }
        .table thead { background-color: #2e7d32; color: white; }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">♻ Reloop</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="index.html">Home</a>
            <a class="nav-link text-white active" href="locations.html">Locations</a>
            <a class="nav-link text-white" href="users.html">Users</a>
            <a class="nav-link text-white" href="items.html">Items</a>
            <a class="nav-link text-white" href="logs.html">Logs</a>
        </div>
    </div>
</nav>
<div class="page-header text-center">
    <h2>📍 Drop Off Locations</h2>
    <p class="mb-0">Manage recycling drop-off points across the UAE</p>
</div>
<div id="toast-container">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toast-message"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>
<div class="container">
    <div class="row mb-3 align-items-center">
        <div class="col-md-5">
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by name...">
                <button class="btn btn-outline-success" onclick="searchLocations()">Search</button>
                <button class="btn btn-outline-secondary" onclick="loadLocations()">Reset</button>
            </div>
        </div>
        <div class="col-md-7 text-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#locationModal" onclick="openAddModal()">+ Add New Location</button>
        </div>
    </div>
    <div id="loading" class="text-center my-4">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-2 text-muted">Loading locations...</p>
    </div>
    <div class="table-responsive" id="tableContainer" style="display:none;">
        <table class="table table-hover table-bordered shadow-sm bg-white">
            <thead>
            <tr><th>ID</th><th>Name</th><th>Address</th><th>Accepted Categories</th><th>Opening</th><th>Closing</th><th>Lat</th><th>Long</th><th>Actions</th></tr>
            </thead>
            <tbody id="locationsTableBody"></tbody>
        </table>
    </div>
    <div id="noResults" class="alert alert-warning text-center" style="display:none;">No locations found.</div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="locationModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background-color:#2e7d32;color:white;">
                <h5 class="modal-title" id="modalTitle">Add Location</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="locationId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Location Name *</label>
                        <input type="text" id="name" class="form-control" placeholder="e.g. Dubai Recycling Center">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Address *</label>
                        <input type="text" id="address" class="form-control" placeholder="e.g. Dubai Marina, Dubai">
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Accepted Categories</label>
                        <input type="text" id="acceptedCategories" class="form-control" placeholder="e.g. Plastic, Glass, Metal">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Opening Time</label>
                        <input type="text" id="openingTime" class="form-control" placeholder="08:00">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Closing Time</label>
                        <input type="text" id="closingTime" class="form-control" placeholder="20:00">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Latitude</label>
                        <input type="number" id="latitude" class="form-control" step="0.0001">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Longitude</label>
                        <input type="number" id="longitude" class="form-control" step="0.0001">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveLocation()">Save Location</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">Are you sure you want to delete <strong id="deleteLocationName"></strong>?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var API = '/api/locations';
    var allLocations = [];
    var deleteId = null;

    function loadLocations() {
        document.getElementById('searchInput').value = '';
        showLoading(true);
        fetch(API)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                allLocations = data;
                renderTable(data);
            })
            .catch(function() { showToast('Error loading locations.', 'danger'); });
    }

    function renderTable(locations) {
        showLoading(false);
        if (locations.length === 0) {
            document.getElementById('noResults').style.display = 'block';
            return;
        }
        document.getElementById('tableContainer').style.display = 'block';
        var rows = '';
        locations.forEach(function(loc) {
            rows += '<tr>' +
                '<td>' + loc.id + '</td>' +
                '<td>' + loc.name + '</td>' +
                '<td>' + loc.address + '</td>' +
                '<td>' + (loc.acceptedCategories || '-') + '</td>' +
                '<td>' + (loc.openingTime || '-') + '</td>' +
                '<td>' + (loc.closingTime || '-') + '</td>' +
                '<td>' + (loc.latitude || '-') + '</td>' +
                '<td>' + (loc.longitude || '-') + '</td>' +
                '<td>' +
                '<button class="btn btn-sm btn-warning me-1" onclick="openEditModal(' + loc.id + ')">Edit</button>' +
                '<button class="btn btn-sm btn-danger" onclick="openDeleteModal(' + loc.id + ', \'' + loc.name + '\')">Delete</button>' +
                '</td></tr>';
        });
        document.getElementById('locationsTableBody').innerHTML = rows;
    }

    function findById(id) {
        var found = null;
        allLocations.forEach(function(loc) {
            if (loc.id === id) { found = loc; }
        });
        return found;
    }

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
        document.getElementById('tableContainer').style.display = 'none';
        document.getElementById('noResults').style.display = 'none';
    }

    function searchLocations() {
        var name = document.getElementById('searchInput').value;
        if (!name) { loadLocations(); return; }
        showLoading(true);
        fetch(API + '/search?name=' + name)
            .then(function(r) { return r.json(); })
            .then(function(data) { renderTable(data); })
            .catch(function() { showToast('Search failed.', 'danger'); });
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Add New Location';
        document.getElementById('locationId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('address').value = '';
        document.getElementById('acceptedCategories').value = '';
        document.getElementById('openingTime').value = '';
        document.getElementById('closingTime').value = '';
        document.getElementById('latitude').value = '';
        document.getElementById('longitude').value = '';
    }

    function openEditModal(id) {
        var loc = findById(id);
        if (!loc) { return; }
        document.getElementById('modalTitle').textContent = 'Edit Location';
        document.getElementById('locationId').value = loc.id;
        document.getElementById('name').value = loc.name;
        document.getElementById('address').value = loc.address;
        document.getElementById('acceptedCategories').value = loc.acceptedCategories || '';
        document.getElementById('openingTime').value = loc.openingTime || '';
        document.getElementById('closingTime').value = loc.closingTime || '';
        document.getElementById('latitude').value = loc.latitude || '';
        document.getElementById('longitude').value = loc.longitude || '';
        new bootstrap.Modal(document.getElementById('locationModal')).show();
    }

    function saveLocation() {
        var name = document.getElementById('name').value;
        var address = document.getElementById('address').value;
        if (!name || !address) { showToast('Name and Address are required.', 'warning'); return; }
        var id = document.getElementById('locationId').value;
        var payload = {
            name: name,
            address: address,
            acceptedCategories: document.getElementById('acceptedCategories').value,
            openingTime: document.getElementById('openingTime').value,
            closingTime: document.getElementById('closingTime').value,
            latitude: parseFloat(document.getElementById('latitude').value) || null,
            longitude: parseFloat(document.getElementById('longitude').value) || null
        };
        fetch(id ? API + '/' + id : API, {
            method: id ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) {
            if (r.ok) {
                bootstrap.Modal.getInstance(document.getElementById('locationModal')).hide();
                loadLocations();
                showToast(id ? 'Location updated!' : 'Location added!', 'success');
            } else { showToast('Failed to save.', 'danger'); }
        }).catch(function() { showToast('Error saving location.', 'danger'); });
    }

    function openDeleteModal(id, name) {
        deleteId = id;
        document.getElementById('deleteLocationName').textContent = name;
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    function confirmDelete() {
        fetch(API + '/' + deleteId, { method: 'DELETE' })
            .then(function(r) {
                if (r.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                    loadLocations();
                    showToast('Location deleted!', 'success');
                } else { showToast('Delete failed.', 'danger'); }
            }).catch(function() { showToast('Error deleting.', 'danger'); });
    }

    function showToast(msg, type) {
        var toast = document.getElementById('toast');
        toast.className = 'toast align-items-center text-white border-0 bg-' + type;
        document.getElementById('toast-message').textContent = msg;
        new bootstrap.Toast(toast, { delay: 3000 }).show();
    }

    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') { searchLocations(); }
    });

    loadLocations();
</script>
</body>
</html>
