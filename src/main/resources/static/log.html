<!DOCTYPE html>
<!-- Naren Karthik - 746009107 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycling Logs - Reloop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f7f0; }
        .navbar { background-color: #2e7d32; }
        .page-header { background-color: #2e7d32; color: white; padding: 20px 0; margin-bottom: 30px; }
        .btn-primary { background-color: #2e7d32; border-color: #2e7d32; }
        .btn-primary:hover { background-color: #1b5e20; border-color: #1b5e20; }
        .table thead { background-color: #2e7d32; color: white; }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">♻ Reloop</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="index.html">Home</a>
            <a class="nav-link text-white" href="locations.html">Locations</a>
            <a class="nav-link text-white" href="users.html">Users</a>
            <a class="nav-link text-white" href="items.html">Items</a>
            <a class="nav-link text-white active" href="logs.html">Logs</a>
        </div>
    </div>
</nav>
<div class="page-header text-center">
    <h2>📋 Recycling Logs</h2>
    <p class="mb-0">Track all recycling activity and environmental impact</p>
</div>
<div id="toast-container">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toast-message"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>
<div class="container">
    <div class="row mb-3 align-items-center">
        <div class="col-md-5">
            <div class="input-group">
                <input type="number" id="searchInput" class="form-control" placeholder="Search by User ID...">
                <button class="btn btn-outline-success" onclick="searchLogs()">Search</button>
                <button class="btn btn-outline-secondary" onclick="loadLogs()">Reset</button>
            </div>
        </div>
        <div class="col-md-7 text-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#logModal" onclick="openAddModal()">+ Add New Log</button>
        </div>
    </div>
    <div id="loading" class="text-center my-4">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-2 text-muted">Loading logs...</p>
    </div>
    <div class="table-responsive" id="tableContainer" style="display:none;">
        <table class="table table-hover table-bordered shadow-sm bg-white">
            <thead>
            <tr><th>ID</th><th>User ID</th><th>Item ID</th><th>Quantity</th><th>Date</th><th>CO2 Saved (kg)</th><th>Landfill Diverted (kg)</th><th>Actions</th></tr>
            </thead>
            <tbody id="logsTableBody"></tbody>
        </table>
    </div>
    <div id="noResults" class="alert alert-warning text-center" style="display:none;">No logs found.</div>
</div>

<div class="modal fade" id="logModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background-color:#2e7d32;color:white;">
                <h5 class="modal-title" id="modalTitle">Add Log</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="logId">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">User ID *</label>
                        <input type="number" id="userId" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Item ID *</label>
                        <input type="number" id="itemId" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Quantity *</label>
                        <input type="number" id="quantity" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Date</label>
                        <input type="date" id="date" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">CO2 Saved (kg)</label>
                        <input type="number" id="estimatedCO2Saved" class="form-control" step="0.01">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Landfill Diverted (kg)</label>
                        <input type="number" id="divertedFromLandfillKg" class="form-control" step="0.01">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveLog()">Save Log</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">Are you sure you want to delete Log #<strong id="deleteLogId"></strong>?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var API = '/api/logs';
    var allLogs = [];
    var deleteId = null;

    function loadLogs() {
        document.getElementById('searchInput').value = '';
        showLoading(true);
        fetch(API)
            .then(function(r) { return r.json(); })
            .then(function(data) { allLogs = data; renderTable(data); })
            .catch(function() { showToast('Error loading logs.', 'danger'); });
    }

    function renderTable(logs) {
        showLoading(false);
        if (logs.length === 0) { document.getElementById('noResults').style.display = 'block'; return; }
        document.getElementById('tableContainer').style.display = 'block';
        var rows = '';
        logs.forEach(function(log) {
            rows += '<tr>' +
                '<td>' + log.id + '</td>' +
                '<td>' + log.userId + '</td>' +
                '<td>' + log.itemId + '</td>' +
                '<td>' + log.quantity + '</td>' +
                '<td>' + (log.date || '-') + '</td>' +
                '<td>' + log.estimatedCO2Saved + '</td>' +
                '<td>' + log.divertedFromLandfillKg + '</td>' +
                '<td>' +
                '<button class="btn btn-sm btn-warning me-1" onclick="openEditModal(' + log.id + ')">Edit</button>' +
                '<button class="btn btn-sm btn-danger" onclick="openDeleteModal(' + log.id + ')">Delete</button>' +
                '</td></tr>';
        });
        document.getElementById('logsTableBody').innerHTML = rows;
    }

    function findById(id) {
        var found = null;
        allLogs.forEach(function(log) { if (log.id === id) { found = log; } });
        return found;
    }

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
        document.getElementById('tableContainer').style.display = 'none';
        document.getElementById('noResults').style.display = 'none';
    }

    function searchLogs() {
        var userId = document.getElementById('searchInput').value;
        if (!userId) { loadLogs(); return; }
        showLoading(true);
        fetch(API + '/search?userId=' + userId)
            .then(function(r) { return r.json(); })
            .then(function(data) { allLogs = data; renderTable(data); })
            .catch(function() { showToast('Search failed.', 'danger'); });
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Add New Log';
        document.getElementById('logId').value = '';
        document.getElementById('userId').value = '';
        document.getElementById('itemId').value = '';
        document.getElementById('quantity').value = '';
        document.getElementById('date').value = '';
        document.getElementById('estimatedCO2Saved').value = '';
        document.getElementById('divertedFromLandfillKg').value = '';
    }

    function openEditModal(id) {
        var log = findById(id);
        if (!log) { return; }
        document.getElementById('modalTitle').textContent = 'Edit Log';
        document.getElementById('logId').value = log.id;
        document.getElementById('userId').value = log.userId;
        document.getElementById('itemId').value = log.itemId;
        document.getElementById('quantity').value = log.quantity;
        document.getElementById('date').value = log.date || '';
        document.getElementById('estimatedCO2Saved').value = log.estimatedCO2Saved;
        document.getElementById('divertedFromLandfillKg').value = log.divertedFromLandfillKg;
        new bootstrap.Modal(document.getElementById('logModal')).show();
    }

    function saveLog() {
        var userId = document.getElementById('userId').value;
        var itemId = document.getElementById('itemId').value;
        var quantity = document.getElementById('quantity').value;
        if (!userId || !itemId || !quantity) { showToast('User ID, Item ID and Quantity are required.', 'warning'); return; }
        var id = document.getElementById('logId').value;
        var payload = {
            userId: parseInt(userId),
            itemId: parseInt(itemId),
            quantity: parseInt(quantity),
            date: document.getElementById('date').value || null,
            estimatedCO2Saved: parseFloat(document.getElementById('estimatedCO2Saved').value) || 0,
            divertedFromLandfillKg: parseFloat(document.getElementById('divertedFromLandfillKg').value) || 0
        };
        fetch(id ? API + '/' + id : API, {
            method: id ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) {
            if (r.ok) {
                bootstrap.Modal.getInstance(document.getElementById('logModal')).hide();
                loadLogs();
                showToast(id ? 'Log updated!' : 'Log added!', 'success');
            } else { showToast('Failed to save.', 'danger'); }
        }).catch(function() { showToast('Error saving log.', 'danger'); });
    }

    function openDeleteModal(id) {
        deleteId = id;
        document.getElementById('deleteLogId').textContent = id;
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    function confirmDelete() {
        fetch(API + '/' + deleteId, { method: 'DELETE' })
            .then(function(r) {
                if (r.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                    loadLogs();
                    showToast('Log deleted!', 'success');
                } else { showToast('Delete failed.', 'danger'); }
            }).catch(function() { showToast('Error deleting.', 'danger'); });
    }

    function showToast(msg, type) {
        var toast = document.getElementById('toast');
        toast.className = 'toast align-items-center text-white border-0 bg-' + type;
        document.getElementById('toast-message').textContent = msg;
        new bootstrap.Toast(toast, { delay: 3000 }).show();
    }

    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') { searchLogs(); }
    });

    loadLogs();
</script>
</body>
</html>
