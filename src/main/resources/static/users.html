<!DOCTYPE html>
<!-- Hussein Al Salami - 746006849 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Reloop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f7f0; }
        .navbar { background-color: #2e7d32; }
        .page-header { background-color: #2e7d32; color: white; padding: 20px 0; margin-bottom: 30px; }
        .btn-primary { background-color: #2e7d32; border-color: #2e7d32; }
        .btn-primary:hover { background-color: #1b5e20; border-color: #1b5e20; }
        .table thead { background-color: #2e7d32; color: white; }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">♻ Reloop</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="index.html">Home</a>
            <a class="nav-link text-white" href="locations.html">Locations</a>
            <a class="nav-link text-white active" href="users.html">Users</a>
            <a class="nav-link text-white" href="items.html">Items</a>
            <a class="nav-link text-white" href="logs.html">Logs</a>
        </div>
    </div>
</nav>
<div class="page-header text-center">
    <h2>👤 Users</h2>
    <p class="mb-0">Manage registered Reloop users</p>
</div>
<div id="toast-container">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toast-message"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>
<div class="container">
    <div class="row mb-3 align-items-center">
        <div class="col-md-5">
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by email...">
                <button class="btn btn-outline-success" onclick="searchUsers()">Search</button>
                <button class="btn btn-outline-secondary" onclick="loadUsers()">Reset</button>
            </div>
        </div>
        <div class="col-md-7 text-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddModal()">+ Add New User</button>
        </div>
    </div>
    <div id="loading" class="text-center my-4">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-2 text-muted">Loading users...</p>
    </div>
    <div class="table-responsive" id="tableContainer" style="display:none;">
        <table class="table table-hover table-bordered shadow-sm bg-white">
            <thead>
            <tr><th>ID</th><th>Full Name</th><th>Phone</th><th>Age</th><th>City</th><th>Email</th><th>Actions</th></tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
        </table>
    </div>
    <div id="noResults" class="alert alert-warning text-center" style="display:none;">No users found.</div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background-color:#2e7d32;color:white;">
                <h5 class="modal-title" id="modalTitle">Add User</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="userId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Full Name *</label>
                        <input type="text" id="fullName" class="form-control" placeholder="e.g. Ahmed Ali">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Email *</label>
                        <input type="email" id="email" class="form-control" placeholder="e.g. ahmed@example.com">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Phone Number</label>
                        <input type="text" id="phoneNumber" class="form-control" placeholder="+971501234567">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Age</label>
                        <input type="number" id="age" class="form-control" placeholder="25">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">City</label>
                        <input type="text" id="city" class="form-control" placeholder="e.g. Dubai">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">Save User</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">Are you sure you want to delete <strong id="deleteUserName"></strong>?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var API = '/api/users';
    var allUsers = [];
    var deleteId = null;

    function loadUsers() {
        document.getElementById('searchInput').value = '';
        showLoading(true);
        fetch(API)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                allUsers = data;
                renderTable(data);
            })
            .catch(function() { showToast('Error loading users.', 'danger'); });
    }

    function renderTable(users) {
        showLoading(false);
        if (users.length === 0) { document.getElementById('noResults').style.display = 'block'; return; }
        document.getElementById('tableContainer').style.display = 'block';
        var rows = '';
        users.forEach(function(u) {
            rows += '<tr>' +
                '<td>' + u.id + '</td>' +
                '<td>' + u.fullName + '</td>' +
                '<td>' + (u.phoneNumber || '-') + '</td>' +
                '<td>' + u.age + '</td>' +
                '<td>' + (u.city || '-') + '</td>' +
                '<td>' + u.email + '</td>' +
                '<td>' +
                '<button class="btn btn-sm btn-warning me-1" onclick="openEditModal(' + u.id + ')">Edit</button>' +
                '<button class="btn btn-sm btn-danger" onclick="openDeleteModal(' + u.id + ', \'' + u.fullName + '\')">Delete</button>' +
                '</td></tr>';
        });
        document.getElementById('usersTableBody').innerHTML = rows;
    }

    function findById(id) {
        var found = null;
        allUsers.forEach(function(u) { if (u.id === id) { found = u; } });
        return found;
    }

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
        document.getElementById('tableContainer').style.display = 'none';
        document.getElementById('noResults').style.display = 'none';
    }

    function searchUsers() {
        var email = document.getElementById('searchInput').value;
        if (!email) { loadUsers(); return; }
        showLoading(true);
        fetch(API + '/search?email=' + email)
            .then(function(r) {
                if (!r.ok) { return null; }
                return r.json();
            })
            .then(function(data) {
                if (!data) { showLoading(false); document.getElementById('noResults').style.display = 'block'; }
                else { allUsers = [data]; renderTable([data]); }
            })
            .catch(function() { showToast('Search failed.', 'danger'); });
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Add New User';
        document.getElementById('userId').value = '';
        document.getElementById('fullName').value = '';
        document.getElementById('email').value = '';
        document.getElementById('phoneNumber').value = '';
        document.getElementById('age').value = '';
        document.getElementById('city').value = '';
    }

    function openEditModal(id) {
        var u = findById(id);
        if (!u) { return; }
        document.getElementById('modalTitle').textContent = 'Edit User';
        document.getElementById('userId').value = u.id;
        document.getElementById('fullName').value = u.fullName;
        document.getElementById('email').value = u.email;
        document.getElementById('phoneNumber').value = u.phoneNumber || '';
        document.getElementById('age').value = u.age;
        document.getElementById('city').value = u.city || '';
        new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    function saveUser() {
        var fullName = document.getElementById('fullName').value;
        var email = document.getElementById('email').value;
        if (!fullName || !email) { showToast('Full Name and Email are required.', 'warning'); return; }
        var id = document.getElementById('userId').value;
        var payload = {
            fullName: fullName,
            email: email,
            phoneNumber: document.getElementById('phoneNumber').value,
            age: parseInt(document.getElementById('age').value) || 0,
            city: document.getElementById('city').value
        };
        fetch(id ? API + '/' + id : API, {
            method: id ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(r) {
            if (r.ok) {
                bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                loadUsers();
                showToast(id ? 'User updated!' : 'User added!', 'success');
            } else { showToast('Failed to save user.', 'danger'); }
        }).catch(function() { showToast('Error saving user.', 'danger'); });
    }

    function openDeleteModal(id, name) {
        deleteId = id;
        document.getElementById('deleteUserName').textContent = name;
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    function confirmDelete() {
        fetch(API + '/' + deleteId, { method: 'DELETE' })
            .then(function(r) {
                if (r.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                    loadUsers();
                    showToast('User deleted!', 'success');
                } else { showToast('Delete failed.', 'danger'); }
            }).catch(function() { showToast('Error deleting.', 'danger'); });
    }

    function showToast(msg, type) {
        var toast = document.getElementById('toast');
        toast.className = 'toast align-items-center text-white border-0 bg-' + type;
        document.getElementById('toast-message').textContent = msg;
        new bootstrap.Toast(toast, { delay: 3000 }).show();
    }

    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') { searchUsers(); }
    });

    loadUsers();
</script>
</body>
</html>
